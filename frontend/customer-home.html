<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Stores - CraveGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div id="nav-container"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-extrabold text-white">Local Stores</h1>
        <p class="text-slate-400 text-sm">Select your favorite shop to browse products</p>
      </div>

      <div class="flex items-center gap-3 w-full md:max-w-md">
        <div class="relative flex-grow">
          <input type="text" id="search-input" onkeyup="filterBusinesses()" placeholder="Search stores..."
                 class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500">
          <svg class="w-5 h-5 text-slate-500 absolute left-3.5 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>
    </div>

    <!-- Stores Listing -->
    <div id="stores-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Loading Skeleton Skeletons will go here -->
      <div class="shimmer-loader h-48 rounded-2xl"></div>
      <div class="shimmer-loader h-48 rounded-2xl"></div>
      <div class="shimmer-loader h-48 rounded-2xl"></div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
      <div class="text-slate-600 mb-4 flex justify-center">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
      </div>
      <h3 class="text-xl font-bold text-slate-300">No stores found</h3>
      <p class="text-slate-500 text-sm mt-1">Try tweaking your search term</p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/customer-home.js"></script>
</body>
</html>
