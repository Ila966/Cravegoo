<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - CraveGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div id="nav-container"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <h1 class="text-3xl font-extrabold text-white mb-8">Checkout</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Checkout Form -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Delivery Details -->
        <div class="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
          <h3 class="text-lg font-bold text-white flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Delivery Address
          </h3>
          <div>
            <label for="checkout-address" class="block text-xs text-slate-400 font-semibold mb-1">Shipping Destination</label>
            <input type="text" id="checkout-address" required placeholder="Street address, City, ZIP code"
                   class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 transition">
          </div>
        </div>

        <!-- Payment Details -->
        <div class="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
          <h3 class="text-lg font-bold text-white flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            Payment Method
          </h3>
          <div class="grid grid-cols-2 gap-4">
            <!-- COD Option -->
            <label class="relative flex items-center gap-3 p-4 bg-slate-900 border border-slate-700 hover:border-indigo-500 rounded-xl cursor-pointer transition select-none">
              <input type="radio" name="payment-method" value="cod" checked class="accent-indigo-500">
              <div>
                <span class="block text-sm font-bold text-slate-200">Cash on Delivery</span>
                <span class="text-[10px] text-slate-400">Pay when order arrives</span>
              </div>
            </label>
            <!-- Card Option -->
            <label class="relative flex items-center gap-3 p-4 bg-slate-900 border border-slate-700 hover:border-indigo-500 rounded-xl cursor-pointer transition select-none">
              <input type="radio" name="payment-method" value="card" class="accent-indigo-500">
              <div>
                <span class="block text-sm font-bold text-slate-200">Mock Card Payment</span>
                <span class="text-[10px] text-slate-400">Simulate online payment</span>
              </div>
            </label>
          </div>

          <!-- Card Form Simulation -->
          <div id="card-simulation" class="hidden p-4 bg-slate-900/60 border border-slate-800 rounded-xl space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-[10px] text-slate-400 mb-1">Card Number</label>
                <input type="text" placeholder="4111 2222 3333 4444" class="w-full px-3 py-2 text-xs bg-slate-900 border border-slate-800 text-slate-100 rounded-lg">
              </div>
              <div>
                <label class="block text-[10px] text-slate-400 mb-1">Expiry Date</label>
                <input type="text" placeholder="MM/YY" class="w-full px-3 py-2 text-xs bg-slate-900 border border-slate-800 text-slate-100 rounded-lg">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Summary Sidebar -->
      <div class="glass-panel p-6 rounded-2xl border border-slate-800 h-fit space-y-6">
        <h3 class="text-lg font-bold text-white border-b border-slate-800 pb-3">Final Ledger</h3>
        
        <div id="checkout-items-list" class="max-h-60 overflow-y-auto space-y-3 pr-2">
          <!-- Filled dynamically -->
        </div>

        <div class="border-t border-slate-800 pt-4 space-y-3 text-sm text-slate-400">
          <div class="flex justify-between">
            <span>Subtotal</span>
            <span id="checkout-subtotal" class="text-slate-200 font-semibold">$0.00</span>
          </div>
          <div class="flex justify-between">
            <span>Delivery Fee</span>
            <span>$3.99</span>
          </div>
          <div class="flex justify-between">
            <span>Tax (8%)</span>
            <span id="checkout-tax" class="text-slate-200 font-semibold">$0.00</span>
          </div>
          <div class="border-t border-slate-800 pt-3 flex justify-between text-base text-white font-bold">
            <span>Grand Total</span>
            <span id="checkout-total" class="text-indigo-400">$0.00</span>
          </div>
        </div>

        <button onclick="placeOrder()" id="btn-submit-order"
                class="w-full py-3.5 bg-gradient-to-tr from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-semibold rounded-xl shadow-lg hover:shadow-indigo-500/20 transition flex items-center justify-center gap-2">
          <span>Place Order</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </button>
      </div>

    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
