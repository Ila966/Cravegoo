<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products - CraveGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div id="nav-container"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex justify-between items-center gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-extrabold text-white">Menu Catalog</h1>
        <p class="text-slate-400 text-sm">Add, update, or remove products from your public digital catalog</p>
      </div>
      <button onclick="openModal()" class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-xl transition shadow flex items-center gap-1.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Add New Product
      </button>
    </div>

    <!-- Products Table -->
    <div class="glass-panel rounded-2xl border border-slate-800 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-900/80 border-b border-slate-850 text-xs font-bold text-slate-400 uppercase tracking-wider">
              <th class="py-4 px-6">Product</th>
              <th class="py-4 px-6">Category</th>
              <th class="py-4 px-6">Price</th>
              <th class="py-4 px-6">Stock Level</th>
              <th class="py-4 px-6 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="products-table-body" class="text-sm text-slate-200">
            <!-- Loading Skeleton Rows -->
            <tr class="shimmer-loader h-12"></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add/Edit Product Modal Overlay -->
  <div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-xs hidden">
    <div class="glass-panel w-full max-w-lg rounded-2xl border border-slate-800 shadow-2xl p-6 relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
      
      <h3 id="modal-title" class="text-xl font-bold text-white mb-6">Add New Menu Item</h3>
      
      <form id="product-form" class="space-y-4">
        <input type="hidden" id="edit-product-id">
        
        <div>
          <label for="prod-name" class="block text-xs font-semibold text-slate-400 mb-1">Product Title</label>
          <input type="text" id="prod-name" required placeholder="e.g. Classic Margherita Pizza"
                 class="w-full px-4 py-2 bg-slate-900 border border-slate-750 rounded-xl text-slate-100 placeholder-slate-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="prod-category" class="block text-xs font-semibold text-slate-400 mb-1">Category</label>
            <input type="text" id="prod-category" required placeholder="Pizza, Salad, Sides..."
                   class="w-full px-4 py-2 bg-slate-900 border border-slate-750 rounded-xl text-slate-100 placeholder-slate-500">
          </div>
          <div>
            <label for="prod-price" class="block text-xs font-semibold text-slate-400 mb-1">Unit Price ($)</label>
            <input type="number" step="0.01" id="prod-price" required placeholder="9.99"
                   class="w-full px-4 py-2 bg-slate-900 border border-slate-750 rounded-xl text-slate-100 placeholder-slate-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="prod-stock" class="block text-xs font-semibold text-slate-400 mb-1">Initial Stock Level</label>
            <input type="number" id="prod-stock" required placeholder="50"
                   class="w-full px-4 py-2 bg-slate-900 border border-slate-750 rounded-xl text-slate-100 placeholder-slate-500">
          </div>
          <div>
            <label for="prod-image" class="block text-xs font-semibold text-slate-400 mb-1">Image URL</label>
            <input type="url" id="prod-image" placeholder="https://images.unsplash.com/..."
                   class="w-full px-4 py-2 bg-slate-900 border border-slate-750 rounded-xl text-slate-100 placeholder-slate-500 text-xs">
          </div>
        </div>

        <div>
          <label for="prod-desc" class="block text-xs font-semibold text-slate-400 mb-1">Description / Recipe details</label>
          <textarea id="prod-desc" rows="3" placeholder="San Marzano tomatoes, buffalo mozzarella, olive oil..."
                    class="w-full px-4 py-2 bg-slate-900 border border-slate-750 rounded-xl text-slate-100 placeholder-slate-500"></textarea>
        </div>

        <button type="submit" id="btn-modal-submit"
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg transition">
          Save Product
        </button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/business-products.js"></script>
</body>
</html>
