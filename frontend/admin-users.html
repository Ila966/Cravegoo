<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - Admin Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div id="nav-container"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center gap-2 mb-8">
      <a href="/admin-dashboard.html" class="text-slate-400 hover:text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      </a>
      <div>
        <h1 class="text-3xl font-extrabold text-white">Moderate System Accounts</h1>
        <p class="text-slate-400 text-sm">Review profile details, assign roles, or delete user accounts</p>
      </div>
    </div>

    <!-- Users Table -->
    <div class="glass-panel rounded-2xl border border-slate-800 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-900/80 border-b border-slate-855 text-xs font-bold text-slate-400 uppercase tracking-wider">
              <th class="py-4 px-6">User Profile</th>
              <th class="py-4 px-6">Email / Phone</th>
              <th class="py-4 px-6">Role</th>
              <th class="py-4 px-6 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body" class="text-sm text-slate-200">
            <tr>
              <td colspan="4" class="py-8 text-center text-slate-500 font-semibold">Loading users...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/admin-users.js"></script>
</body>
</html>
